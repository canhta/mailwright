repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.20
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.11.2
    hooks:
      - id: mypy
        args: [--config-file=pyproject.toml]
        files: ^src/
        additional_dependencies:
          - pydantic-settings>=2.4
          - httpx>=0.27
          - openai>=1.50
          - fastapi>=0.111
          - types-requests
          - cryptography>=43.0
